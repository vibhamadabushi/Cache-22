<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 250px; 
      background-color: #0f172a; 
      color: #f8fafc; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 15px; 
    }
    h2 { 
      margin: 0 0 10px 0; 
      color: #38bdf8; 
      font-size: 20px; 
      text-align: center; 
      border-bottom: 1px solid #1e293b; 
      padding-bottom: 10px;
    }
    .status { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 15px; 
      background: #1e293b; 
      padding: 10px 15px; 
      border-radius: 8px; 
      border: 1px solid #334155;
    }
    .dot { 
      height: 12px; 
      width: 12px; 
      background-color: #10b981; 
      border-radius: 50%; 
      display: inline-block; 
      box-shadow: 0 0 8px #10b981; 
    }
    .stat-box { 
      text-align: center; 
      border: 1px solid #334155; 
      background: #020617;
      padding: 15px; 
      border-radius: 8px; 
    }
    .number { 
      font-size: 22px; 
      font-weight: bold; 
      color: #38bdf8; 
      margin-bottom: 5px;
    }
    .label { 
      font-size: 13px; 
      color: #94a3b8; 
    }
  </style>
</head>
<body>
  <h2>🛡️ Cache 22</h2>
  
  <div class="status">
    <span style="font-size: 15px; font-weight: 500;">Protection Engine</span>
    <span class="dot"></span>
  </div>
  
  <div class="stat-box">
    <div class="number">ACTIVE</div>
    <div class="label">Zero-Click Consent Enabled</div>
  </div>
</body>
</html>
